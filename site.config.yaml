schema_version: "1.0"
description: >
  Statische tagcore.de-Bewerbungsseite. Export erzeugt dist/ für Upload beim Hoster.

# Anzeigename der Marke (Footer, Seitentitel)
brand_name: TagCore

# Konfigurierte Domain (www-Subdomain für QR-Links und absolute URLs)
domain: tagcore.de
base_url: https://www.tagcore.de

# QR-Ziel auf gedruckten Unterlagen (Startseite mit Portfolio)
qr_landing_path: /

# Pfade relativ zu diesem Projekt oder absolut (Windows)
profile_yaml: "../BewerbungsAgent/knowledge/profile.yaml"
experiences_dir: "../BewerbungsAgent/knowledge/experiences"
sender_config: "../BewerbungsAgent/knowledge/docx/config.yaml"
applications_base: "K:/AI/Bewerbungen 2026"
reference_base: "K:/AI/application documents"

# Nur Bewerbungen mit freigegebenem Anschreiben (metadata.approved_at gesetzt)
require_approved: true

output_dir: dist
